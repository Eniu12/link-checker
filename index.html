<!DOCTYPE html>
<html>
<head>
<title>Safe URL Checker</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
padding:40px;
}

input{
padding:10px;
width:300px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
margin-left:10px;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>🔎 Safe URL Checker</h1>
<p>Enter a website link to check:</p>

<input id="urlInput" placeholder="https://example.com">
<button onclick="check()">Check</button>

<p id="result"></p>

<script>
function check(){
let url=document.getElementById("urlInput").value;

if(url===""){
document.getElementById("result").innerText="Please enter a URL";
return;
}

document.getElementById("result").innerText=
"Scanning "+url+"...";
}
</script>

</body>
</html
